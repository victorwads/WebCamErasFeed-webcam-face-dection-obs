name: CameraDirector
options:
  bundleIdPrefix: com.victorwads
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    PRODUCT_NAME: CameraDirector
    SWIFT_VERSION: "5.10"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  CameraDirector:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.victorwads.CameraDirector
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: CameraDirector
        INFOPLIST_KEY_NSCameraUsageDescription: CameraDirector needs camera access to capture frames from local webcams for monitoring and face detection.
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.video
    scheme:
      testTargets:
        - CameraDirectorTests
  CameraDirectorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: CameraDirector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.victorwads.CameraDirectorTests
        PRODUCT_NAME: CameraDirectorTests
        PRODUCT_MODULE_NAME: CameraDirectorTests
